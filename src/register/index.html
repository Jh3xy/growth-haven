<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowthHaven | Create Account</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../assets/js/script.js"></script>
  <script type="module" src="./register.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="reg-header">
    <a href="/" class="reg-header__logo" aria-label="GrowthHaven home">
      <div class="site-header__logo flex items-center">
        <img src="/logo.svg" alt="logo" class="site-header__wordmark" onerror="this.onerror=null; this.src='fallback.jpg';">
        <span class="site-header__wordmark">GrowthHaven</span>
        <!-- <div class="site-header__divider hidden-mobile"></div>
        <span class="site-header__tagline hidden-mobile uppercase">Institutional Grade</span> -->
      </div>
    </a>
  </header>


  <!-- PAGE -->
  <div class="reg-page">
    <div class="reg-card" id="regCard">

      <!-- Progress Bar -->
      <div class="reg-progress" aria-hidden="true">
        <div class="reg-progress__fill" id="progressFill"></div>
      </div>

      <!-- SLIDER -->
      <div class="reg-slider" id="regSlider">


        <!-- ====================================================
             SLIDE 1 — REGISTRATION FORM
        ==================================================== -->
        <div class="reg-slide" id="slide1">

          <h1 class="slide-heading">Create your account.</h1>
          <p class="slide-subheading">Start your journey.</p>

          <form id="regForm" novalidate>

            <!-- Name Row -->
            <div class="form-row">
              <div class="form-field form-field--inline">
                <label class="form-label required" for="firstName">First Name</label>
                <input class="form-field__input" id="firstName" type="text"
                       placeholder="Jane" autocomplete="given-name" required />
                <span class="field-error" id="err-firstName"></span>
              </div>
              <div class="form-field form-field--inline">
                <label class="form-label required" for="lastName">Last Name</label>
                <input class="form-field__input" id="lastName" type="text"
                       placeholder="Doe" autocomplete="family-name" required />
                <span class="field-error" id="err-lastName"></span>
              </div>
            </div>

            <!-- Email -->
            <div class="form-field">
              <label class="form-label required" for="regEmail">Email</label>
              <input class="form-field__input" id="regEmail" type="email"
                     placeholder="john.doe@institution.com" autocomplete="email" required />
              <span class="field-error" id="err-email"></span>
            </div>

            <!-- Create Password -->
            <div class="form-field">
              <label class="form-label required" for="regPw">Create Password</label>
              <div class="form-input-wrap">
                <input class="form-field__input form-input--pw" id="regPw" type="password"
                       placeholder="••••••••" autocomplete="new-password" required />
                <button class="pw-toggle" type="button"
                        aria-label="Toggle password visibility"
                        data-target="regPw">
                  <i data-lucide="eye" class="icon-eye"></i>
                  <i data-lucide="eye-off" class="icon-eye-off"></i>
                </button>
              </div>
              <!-- <div class="pw-rules" aria-live="polite">
                <span class="pw-rule" data-rule="length">
                  <span class="pw-rule__dot"></span>8+ Characters
                </span>
                <span class="pw-rule" data-rule="case">
                  <span class="pw-rule__dot"></span>Upper &amp; Lowercase
                </span>
                <span class="pw-rule" data-rule="symbol">
                  <span class="pw-rule__dot"></span>1 Symbol
                </span>
              </div> -->
              <span class="field-error" id="err-pw"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-field">
              <label class="form-label required" for="regPwConfirm">Confirm Password</label>
              <div class="form-input-wrap">
                <input class="form-field__input form-input--pw" id="regPwConfirm" type="password"
                       placeholder="••••••••" autocomplete="new-password" required />
                <button class="pw-toggle" type="button"
                        aria-label="Toggle confirm password visibility"
                        data-target="regPwConfirm">
                  <i data-lucide="eye" class="icon-eye"></i>
                  <i data-lucide="eye-off" class="icon-eye-off"></i>
                </button>
              </div>
              <span class="field-error" id="err-pwConfirm"></span>
            </div>

             <!-- Invite Code field -->
            <div class="form-field">
              <label class="form-label" for="inviteCode">Invite Code</label>
              <div class="form-input-wrap">
                <input class="form-field__input form-input--pw" id="inviteCode" type="text"
                       placeholder="ADMIN" value="ADMIN" autocomplete="" />
              </div>
              <span class="field-error" id="err-pwConfirm"></span>
            </div>

            <!-- Terms -->
            <div class="terms-row">
              <input class="terms-checkbox" type="checkbox" id="terms" />
              <label class="terms-label" for="terms">
                I agree to the <a href="/src/terms/">Terms of Service</a> and
                <a href="/src/privacy/"> Privacy Protocol</a>.
              </label>
            </div>

            <!-- Submit -->
            <button class="reg-btn" type="submit" id="regSubmitBtn">
              Create Account
              <i data-lucide="shield-check"></i>
            </button>

          </form>

          <p class="signin-link">
            Already have an account? <a href="/src/login/">Sign In</a>
          </p>

        </div><!-- /slide1 -->


        <!-- ====================================================
             SLIDE 2 — OTP VERIFICATION
        ==================================================== -->
        <div class="reg-slide" id="slide2" aria-live="polite">

          <div class="otp-icon">
            <i data-lucide="mail-open"></i>
          </div>

          <h2 class="slide-heading">Verify your email.</h2>
          <p class="slide-subheading">We've sent a 6-digit code to</p>
          <span class="otp-email-hint" id="otpEmailHint">your email</span>

          <!-- OTP Boxes -->
          <div class="otp-boxes" id="otpBoxes" role="group" aria-label="One-time passcode">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" autocomplete="one-time-code" aria-label="Digit 1" />
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" aria-label="Digit 2" />
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" aria-label="Digit 3" />
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" aria-label="Digit 4" />
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" aria-label="Digit 5" />
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1"
                   pattern="[0-9]" aria-label="Digit 6" />
          </div>

          <p class="otp-error" id="otpError" role="alert"></p>

          <!-- Verify Button -->
          <button class="reg-btn" id="verifyBtn" disabled>
            Verify &amp; Continue
            <i data-lucide="arrow-right"></i>
          </button>

          <!-- Resend -->
          <div class="resend-row">
            <span>Didn't receive it?</span>
            <button class="resend-btn" id="resendBtn" disabled>Resend</button>
            <span class="resend-timer" id="resendTimer"></span>
          </div>

          <!-- Back -->
          <button class="otp-back" id="backBtn" type="button">
            <i data-lucide="arrow-left"></i>
            Edit details
          </button>

        </div><!-- /slide2 -->

      </div><!-- /reg-slider -->
    </div><!-- /reg-card -->
  </div><!-- /reg-page -->


  <!-- FOOTER -->
  <footer class="reg-footer">
    <span class="reg-footer__copy">
      &copy; 2025 GrowthHaven. Institutional-grade security.
    </span>
    <nav class="reg-footer__links">
      <a href="#" class="reg-footer__link">Security</a>
      <a href="#" class="reg-footer__link">Privacy</a>
      <a href="#" class="reg-footer__link">Terms</a>
    </nav>
  </footer>

  <script>
    // ---- Init Lucide ----
    lucide.createIcons();
  </script>
</body>
</html>
